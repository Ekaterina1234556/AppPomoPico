name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential git python3 python3-dev python3-pip \
            zip unzip autoconf libtool pkg-config \
            zlib1g-dev libffi-dev libssl-dev cmake wget
          sudo apt-get clean
      
      - name: Install Buildozer
        run: |
          pip install buildozer cython==0.29.33
      
      - name: Verify Java
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
      
      - name: Install Android SDK to Buildozer path
        run: |
          # Путь Buildozer к SDK
          BUILDOZER_SDK_PATH="/home/runner/.buildozer/android/platform/android-sdk"
          mkdir -p "$BUILDOZER_SDK_PATH"
          
          echo "Installing SDK to: $BUILDOZER_SDK_PATH"
          
          # Скачиваем cmdline-tools (версия 9.0)
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O /tmp/cmdline-tools.zip
          cd /tmp && unzip -q cmdline-tools.zip
          
          # Устанавливаем в новую структуру (cmdline-tools/latest)
          mkdir -p "$BUILDOZER_SDK_PATH/cmdline-tools"
          mv cmdline-tools "$BUILDOZER_SDK_PATH/cmdline-tools/latest"
          
          # ⭐ ВАЖНО: Создаём симлинк tools -> cmdline-tools/latest
          # Buildozer ищет sdkmanager в tools/bin/, а не в cmdline-tools/latest/bin/
          mkdir -p "$BUILDOZER_SDK_PATH/tools"
          ln -s "$BUILDOZER_SDK_PATH/cmdline-tools/latest/bin" "$BUILDOZER_SDK_PATH/tools/bin"
          ln -s "$BUILDOZER_SDK_PATH/cmdline-tools/latest/lib" "$BUILDOZER_SDK_PATH/tools/lib"
          
          # Проверяем, что симлинк работает
          echo "=== Checking symlink ==="
          ls -la "$BUILDOZER_SDK_PATH/tools/"
          ls -la "$BUILDOZER_SDK_PATH/tools/bin/"
          test -f "$BUILDOZER_SDK_PATH/tools/bin/sdkmanager" && echo "✅ sdkmanager found via symlink" || echo "❌ sdkmanager NOT found"
          
          # Принимаем лицензии
          yes | "$BUILDOZER_SDK_PATH/tools/bin/sdkmanager" --sdk_root="$BUILDOZER_SDK_PATH" --licenses || true
          
          # Устанавливаем build-tools и platform-tools
          "$BUILDOZER_SDK_PATH/tools/bin/sdkmanager" --sdk_root="$BUILDOZER_SDK_PATH" \
            "build-tools;33.0.2" \
            "platform-tools" \
            "platforms;android-33"
          
          # Проверяем установку
          echo "=== Checking build-tools ==="
          ls -la "$BUILDOZER_SDK_PATH/build-tools/" || echo "build-tools not found"
          ls -la "$BUILDOZER_SDK_PATH/build-tools/33.0.2/aidl" || echo "aidl not found"
          
          # Устанавливаем переменные окружения
          echo "ANDROID_HOME=$BUILDOZER_SDK_PATH" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$BUILDOZER_SDK_PATH" >> $GITHUB_ENV
          echo "$BUILDOZER_SDK_PATH/tools/bin" >> $GITHUB_PATH
          echo "$BUILDOZER_SDK_PATH/platform-tools" >> $GITHUB_PATH
          echo "$BUILDOZER_SDK_PATH/build-tools/33.0.2" >> $GITHUB_PATH
      
      - name: Build APK
        run: |
          echo "Starting build..."
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "=== SDK structure ==="
          ls -la $ANDROID_HOME/
          ls -la $ANDROID_HOME/tools/ || echo "tools/ not found"
          ls -la $ANDROID_HOME/build-tools/ || echo "build-tools/ not found"
          buildozer android debug
        env:
          BUILDOZER_WARN_ON_ROOT: 0
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
      
      - name: Check output
        if: always()
        run: |
          ls -la
          ls -la bin/ || echo "bin/ not found"
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AppPomodoro-APK
          path: bin/*.apk
          retention-days: 30
