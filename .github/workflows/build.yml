name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java 17 (CRITICAL)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential git python3 python3-dev python3-pip \
            zip unzip autoconf libtool pkg-config \
            zlib1g-dev libffi-dev libssl-dev cmake wget
          sudo apt-get clean
      
      - name: Install Buildozer
        run: |
          pip install buildozer cython==0.29.33
      
      - name: Verify Java
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
          # Убеждаемся, что это Java 17
          java -version 2>&1 | grep "17\." || (echo "ERROR: Java 17 not found!" && exit 1)
      
      - name: Install Android SDK manually
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          
          # Скачиваем СТАРУЮ версию cmdline-tools (9.0), которая работает с Java 11-17
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O /tmp/cmdline-tools.zip
          cd /tmp && unzip -q cmdline-tools.zip
          mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          
          # Принимаем лицензии
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses || true
          
          # Устанавливаем build-tools 33.0.2
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME \
            "build-tools;33.0.2" \
            "platform-tools" \
            "platforms;android-33"
          
          # Устанавливаем переменные окружения
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
      
      - name: Build APK
        run: |
          echo "Building APK..."
          buildozer android debug
        env:
          BUILDOZER_WARN_ON_ROOT: 0
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AppPomodoro-APK
          path: bin/*.apk
          retention-days: 30
