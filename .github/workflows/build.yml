name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            openjdk-17-jdk \
            build-essential \
            git \
            python3 \
            python3-dev \
            python3-pip \
            zip \
            unzip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libffi-dev \
            libssl-dev \
            cmake \
            wget
          sudo apt-get clean
      
      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.33
      
      - name: Install Android SDK build-tools
        run: |
          # Создаём папку для Android SDK
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          
          # Скачиваем cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/bin cmdline-tools/lib cmdline-tools/NOTICE.txt cmdline-tools/source.properties cmdline-tools/latest/ 2>/dev/null || true
          
          # Принимаем лицензии
          yes | cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk --licenses || true
          
          # Устанавливаем build-tools и platform-tools
          cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk \
            "build-tools;33.0.2" \
            "platform-tools" \
            "platforms;android-33"
          
          # Устанавливаем переменные окружения
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "$HOME/android-sdk/build-tools/33.0.2" >> $GITHUB_PATH
      
      - name: Verify Android SDK
        run: |
          echo "ANDROID_HOME: $ANDROID_HOME"
          ls -la $ANDROID_HOME/build-tools/ || echo "build-tools not found"
          ls -la $ANDROID_HOME/build-tools/33.0.2/ || echo "33.0.2 not found"
          which aidl || echo "aidl not in PATH"
          $ANDROID_HOME/build-tools/33.0.2/aidl --version || echo "aidl check failed"
      
      - name: Build APK
        run: |
          echo "Starting build..."
          ls -la
          buildozer android debug
        env:
          BUILDOZER_WARN_ON_ROOT: 0
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AppPomodoro-APK
          path: bin/*.apk
          retention-days: 30
