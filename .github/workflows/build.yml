name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential git python3 python3-dev python3-pip \
            zip unzip autoconf libtool pkg-config \
            zlib1g-dev libffi-dev libssl-dev cmake wget
          sudo apt-get clean
      
      - name: Install Buildozer
        run: |
          pip install buildozer cython==0.29.33
      
      - name: Verify Java version
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
      
      - name: Build APK with Buildozer
        uses: AndreMiras/buildozer-action@v1
        with:
          command: buildozer android debug
          working-directory: .
        env:
          BUILDOZER_WARN_ON_ROOT: 0
      
      - name: List build output
        if: always()
        run: |
          ls -la
          ls -la bin/ || echo "bin/ not found"
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AppPomodoro-APK
          path: bin/*.apk
          retention-days: 30
